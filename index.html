<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f7f7f9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Depósito">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="icon" sizes="512x512" href="icon-512.png">
<title>Depósito · Control de Pallets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f9;
  --bg-2:#ffffff;
  --surface:#ffffff;
  --surface-2:#eef0f3;
  --text:#14151a;
  --text-dim:#52565f;
  --text-faint:#8a8f9a;
  --accent:#e0b800;
  --accent-text:#14151a;
  --ok:#1f9d5c;
  --ok-bg:rgba(31,157,92,.12);
  --ok-border:rgba(31,157,92,.4);
  --danger:#d9392b;
  --danger-bg:rgba(217,57,43,.10);
  --danger-border:rgba(217,57,43,.4);
  --border:#dcdfe5;
  --radius:14px;
  --font-display:'Space Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font-body);
  font-size:14px;
  color:var(--text);
  background:var(--bg);
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit}
::selection{background:var(--accent);color:var(--accent-text)}

/* ---------- App shell ---------- */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:560px;margin:0 auto;background:var(--bg);position:relative}

.topbar{
  padding:calc(12px + var(--safe-t)) 16px 10px;
  background:linear-gradient(180deg,var(--bg-2),var(--bg));
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand h1{
  font-family:var(--font-display);
  font-size:16px;
  letter-spacing:.02em;
  display:flex;align-items:center;gap:8px;
}
.brand h1 .tag{
  background:var(--accent);color:var(--accent-text);
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.06em;
}
.save-ind{font-size:10.5px;color:var(--text-faint);display:flex;align-items:center;gap:5px}
.save-ind .dot{width:6px;height:6px;border-radius:50%;background:var(--text-faint);transition:background .2s}
.save-ind.saved .dot{background:var(--ok)}

.search-bar{position:relative}
.search-bar input{
  width:100%;padding:11px 14px;font-size:14px;border:1px solid var(--border);border-radius:11px;
  background:var(--surface);color:var(--text);
}
.search-bar input::placeholder{color:var(--text-faint)}
.search-bar input:focus{outline:none;border-color:var(--accent)}

.search-results{padding:0 16px;margin-top:10px}
.search-hit{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  padding:10px 12px;border:1px solid var(--border);border-radius:11px;margin-bottom:6px;
  font-size:12px;cursor:pointer;background:var(--surface);
}
.search-hit:active{border-color:var(--accent)}
.search-hit b{color:var(--text);font-family:var(--font-display);font-size:11px}
.search-hit .arrow{color:var(--text-faint);flex-shrink:0}
.no-hits{color:var(--text-faint);font-size:12px;padding:6px 2px}

/* ---------- Stats strip ---------- */
.stats{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{
  background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:8px 14px;text-align:center;min-width:74px;flex-shrink:0;
}
.stat .v{font-family:var(--font-display);font-size:18px;font-weight:700}
.stat .l{font-size:9.5px;color:var(--text-faint);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

/* ---------- Content / panels ---------- */
.content{flex:1;overflow-y:auto;padding-bottom:90px;-webkit-overflow-scrolling:touch}
.panel{display:none}
.panel.active{display:block}

.dep-wrap{display:flex;gap:18px;overflow-x:auto;padding:6px 16px 14px;scroll-snap-type:x proximity}
.bloque{
  display:flex;flex-direction:column;border:1px solid var(--border);border-radius:13px;overflow:hidden;
  width:160px;flex-shrink:0;scroll-snap-align:start;background:var(--surface);
}
.bloque-label{
  background:var(--surface-2);color:var(--text-dim);font-family:var(--font-display);
  font-size:9.5px;font-weight:700;text-align:center;padding:7px 6px;letter-spacing:.06em;
  border-bottom:1px solid var(--border);
}
.celda{
  border-bottom:1px solid var(--border);min-height:64px;cursor:pointer;
  display:flex;flex-direction:row;position:relative;
  transition:background .12s;
}
.celda:last-child{border-bottom:none}
.celda:active{filter:brightness(1.15)}
.celda.libre{background:var(--ok-bg)}
.celda.ocupada{background:var(--danger-bg)}
.celda.resaltada{box-shadow:inset 0 0 0 2px var(--accent)}
.celda .etiq{
  font-family:var(--font-display);font-weight:700;font-size:10px;
  background:var(--accent);color:var(--accent-text);
  display:flex;align-items:center;justify-content:center;
  min-width:22px;width:22px;flex-shrink:0;writing-mode:vertical-rl;transform:rotate(180deg);
}
.celda-inner{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px;padding:6px 9px;overflow:hidden;min-width:0}
.celda .dat{font-size:10.5px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.celda .sub{font-size:9.5px;color:var(--text-dim);white-space:nowrap}
.celda .pals{font-family:var(--font-display);font-size:10px;font-weight:700;color:var(--text)}
.celda.libre .dat{color:var(--text-faint);font-style:italic;font-weight:400}

.fijo-stack{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:13px;overflow:hidden;width:160px;flex-shrink:0;scroll-snap-align:start}
.fijo-box{min-height:58px;display:flex;flex-direction:column;justify-content:center;padding:9px 10px;border-bottom:1px solid var(--border);background:var(--surface)}
.fijo-box:last-child{border-bottom:none}
.fijo-box.estatico{background:var(--surface-2)}
.fijo-box.dinamico{cursor:pointer}
.fijo-box.dinamico:active{filter:brightness(1.15)}
.fijo-box.dinamico.libre{background:var(--ok-bg)}
.fijo-box.dinamico.ocupada{background:var(--danger-bg)}
.fijo-box.resaltada{box-shadow:inset 0 0 0 2px var(--accent)}
.fijo-label{font-size:10px;font-weight:600;color:var(--text-dim);line-height:1.3;margin-bottom:3px}
.fijo-data{font-size:10px;color:var(--text)}
.fijo-data .free{color:var(--ok)}

.zonas{display:flex;flex-direction:column;gap:18px;flex-shrink:0;padding-top:0}

.legend{display:flex;gap:14px;padding:4px 16px 18px;font-size:10.5px;color:var(--text-dim);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.lsq{width:10px;height:10px;border-radius:3px;display:inline-block}

/* ---------- Bottom tab bar ---------- */
.tabbar{
  position:absolute;left:0;right:0;bottom:0;
  display:flex;border-top:1px solid var(--border);
  background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  padding-bottom:var(--safe-b);flex-shrink:0;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 4px 8px;border:none;background:transparent;cursor:pointer;color:var(--text-faint);
}
.tab svg{width:20px;height:20px}
.tab .lbl{font-size:10px;font-weight:600;letter-spacing:.01em}
.tab.active{color:var(--accent)}

/* ---------- Bottom sheet modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-overlay.center{align-items:center;padding:20px}
.modal{
  background:var(--bg-2);width:100%;max-width:560px;
  border-radius:20px 20px 0 0;
  padding:10px 18px calc(18px + var(--safe-b));
  max-height:86vh;overflow-y:auto;
  border:1px solid var(--border);border-bottom:none;
}
.modal-overlay.center .modal{border-radius:18px;border-bottom:1px solid var(--border);max-height:80vh}
.modal-handle{width:38px;height:4px;border-radius:3px;background:var(--border);margin:2px auto 14px}
.modal h3{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}

.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;font-weight:500}
.fr input,.fr select,.fr textarea{
  width:100%;padding:11px 12px;font-size:14.5px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text);
}
.fr input:focus,.fr textarea:focus{outline:none;border-color:var(--accent)}
.fr input:disabled{opacity:.6}
.fr textarea{resize:vertical;min-height:56px}

.btn-row{display:flex;gap:8px;margin-top:16px}
.btn-row.stack{flex-direction:column-reverse}
.btn{padding:12px 16px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;flex:1;text-align:center}
.btn:active{transform:scale(.98)}
.btn-ok{background:var(--ok);color:#0b2014}
.btn-eg{background:var(--danger);color:#2a0c08}
.btn-ca{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-add{background:var(--accent);color:var(--accent-text)}

.lot-item{border:1px solid var(--border);border-radius:13px;padding:12px 13px;margin-bottom:10px;font-size:12.5px;background:var(--surface)}
.lot-item .lr{display:flex;justify-content:space-between;gap:8px;margin-bottom:5px}
.lot-item .lk{color:var(--text-faint);font-size:11px}
.lot-item .total{font-family:var(--font-display);font-weight:700;color:var(--accent)}
.lot-item .meta{color:var(--text-faint);font-size:10.5px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.empty-msg{color:var(--text-faint);font-size:13px;margin:10px 0 16px;text-align:center;padding:20px 0}

.lot-summary{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);border-radius:13px;padding:11px 13px;margin-bottom:14px;background:var(--surface-2)}
.lot-summary div{text-align:center;flex:1}
.lot-summary .v{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--accent)}
.lot-summary .l{font-size:9.5px;color:var(--text-faint);margin-top:2px}

/* ---------- Log / seguimiento ---------- */
.filter-bar{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{
  padding:9px 12px;font-size:12.5px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text);flex:1;min-width:110px;
}
.filter-bar .btn{flex:0 0 auto;width:auto}

.log-list{padding:0 16px}
.log-card{border:1px solid var(--border);border-radius:13px;padding:12px 13px;margin-bottom:9px;background:var(--surface)}
.log-card .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.b-in{background:var(--ok-bg);color:var(--ok)}
.b-out{background:var(--danger-bg);color:var(--danger)}
.log-card .when{font-size:10.5px;color:var(--text-faint);font-family:var(--font-display)}
.log-card .celda-name{font-family:var(--font-display);font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text)}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;font-size:11.5px}
.log-grid .k{color:var(--text-faint)}
.log-grid .row{display:flex;justify-content:space-between;gap:6px}
.empty-log{color:var(--text-faint);font-size:13px;text-align:center;padding:40px 20px}

/* ---------- Install banner ---------- */
.install-banner{
  display:none;margin:10px 16px 0;padding:11px 13px;border-radius:12px;
  background:var(--surface-2);border:1px solid var(--accent);align-items:center;gap:10px;
}
.install-banner.show{display:flex}
.install-banner .txt{flex:1;font-size:11.5px;color:var(--text-dim)}
.install-banner button{background:var(--accent);color:var(--accent-text);border:none;padding:8px 12px;border-radius:8px;font-size:11.5px;font-weight:700;cursor:pointer}

@media (min-width:600px){
  body{background:var(--bg-2)}
  .app{margin-top:18px;margin-bottom:18px;border-radius:18px;height:calc(100vh - 36px);height:calc(100dvh - 36px);overflow:hidden;border:1px solid var(--border)}
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <h1>DEPÓSITO <span class="tag">PALLETS</span></h1>
      <div class="save-ind" id="save-ind"><span class="dot"></span><span id="save-text">Cargando…</span></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Buscar bodega, botella, OP o celda…" oninput="renderSearch()">
    </div>
    <div class="search-results" id="search-results"></div>
    <div class="install-banner" id="install-banner">
      <div class="txt">Instalá esta app en tu teléfono para usarla como una app nativa, incluso sin conexión.</div>
      <button onclick="doInstall()">Instalar</button>
    </div>
  </div>

  <div class="content">
    <div id="panel-plano" class="panel active">
      <div class="stats" id="stats"></div>
      <div class="dep-wrap" id="dep"></div>
      <div class="legend">
        <span><span class="lsq" style="background:var(--ok)"></span>Libre</span>
        <span><span class="lsq" style="background:var(--danger)"></span>Ocupada</span>
        <span><span class="lsq" style="background:var(--accent)"></span>Código de celda</span>
      </div>
    </div>

    <div id="panel-log" class="panel">
      <div class="filter-bar">
        <input type="text" id="ftxt" placeholder="Buscar…" oninput="renderLog()">
        <select id="ftipo" onchange="renderLog()">
          <option value="">Todos</option>
          <option value="ingreso">Ingreso</option>
          <option value="egreso">Egreso</option>
        </select>
        <button class="btn btn-ca" onclick="exportCSV()">Exportar CSV</button>
      </div>
      <div class="log-list" id="log-body"></div>
    </div>
  </div>

  <div class="tabbar">
    <button class="tab active" id="tabbtn-plano" onclick="showTab('plano')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="lbl">Plano</span>
    </button>
    <button class="tab" id="tabbtn-log" onclick="showTab('log')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      <span class="lbl">Seguimiento</span>
    </button>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 id="m-title"></h3>
      <div id="m-body"></div>
    </div>
  </div>

</div>

<script>
/* ================= PERSISTENCIA (localStorage) ================= */
const STORAGE_KEY='deposito-estado-v3';
let pallets={};
let log=[];
let loteSeq=1;

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed=JSON.parse(raw);
      pallets=parsed.pallets||{};
      log=parsed.log||[];
      loteSeq=parsed.loteSeq||1;
    }
    setSaveText('Datos cargados',true);
  }catch(e){
    setSaveText('Sin datos previos',false);
  }
  renderDep();renderStats();
}

let saveTimeout=null;
function scheduleSave(){
  setSaveText('Guardando…',false);
  if(saveTimeout)clearTimeout(saveTimeout);
  saveTimeout=setTimeout(saveState,250);
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({pallets,log,loteSeq}));
    setSaveText('Guardado',true);
  }catch(e){
    setSaveText('Error al guardar',false);
  }
}
function setSaveText(txt,ok){
  document.getElementById('save-text').textContent=txt;
  document.getElementById('save-ind').classList.toggle('saved',!!ok);
}

/* ================= DATOS DEL DEPÓSITO ================= */
const BLOQUE_DECORAR_1={label:'PRODUCTO A DECORAR',tipo:'decorar',celdas:['1D','2D','3D','4D','5D','6D']};
const BLOQUE_DECORAR_2={label:'PRODUCTO A DECORAR',tipo:'decorar',celdas:['1E','2E']};
const BLOQUE_TERM_1={label:'PRODUCTO TERMINADO',tipo:'terminado',celdas:['1C','2C','3C','4C']};
const BLOQUE_TERM_2={label:'PRODUCTO TERMINADO',tipo:'terminado',celdas:['5C','6C','7C','8C','9C','10C']};

const FIJOS_IZQ=[
  {label:'PRODUCTOS EXCLUIDOS DE WENTEK',conDatos:false},
  {label:'ALMACÉN TEMPORAL DE MAQUINARIA',conDatos:false},
  {label:'TALLER METALÚRGICA',conDatos:false},
];
const FIJOS_DER=[
  {label:'PRODUCTO A RECUPERAR',conDatos:true,id:'RECUPERAR'},
  {label:'PNC',conDatos:true,id:'PNC'},
  {label:'PRODUCTO WENTEK',conDatos:true,id:'PWENTEK'},
  {label:'TALLER ELÉCTRICO Y PAÑOL DE REPUESTOS',conDatos:false},
];

function getLotes(id){return pallets[id]||[]}

function allLabels(){
  const map={};
  [BLOQUE_DECORAR_1,BLOQUE_DECORAR_2,BLOQUE_TERM_1,BLOQUE_TERM_2].forEach(b=>{
    b.celdas.forEach(cod=>map[cod]=cod);
  });
  FIJOS_DER.filter(f=>f.conDatos).forEach(f=>map[f.id]=f.label);
  return map;
}

/* ================= BUSCADOR ================= */
function renderSearch(){
  const q=(document.getElementById('search-input').value||'').trim().toLowerCase();
  const cont=document.getElementById('search-results');
  if(!q){cont.innerHTML='';clearHighlights();return;}
  const labels=allLabels();
  const hits=[];
  Object.keys(pallets).forEach(id=>{
    getLotes(id).forEach(l=>{
      const s=`${id} ${labels[id]||''} ${l.bodega||''} ${l.decorado||''} ${l.op||''}`.toLowerCase();
      if(s.includes(q))hits.push({id,label:labels[id]||id,l});
    });
  });
  if(!hits.length){
    cont.innerHTML='<p class="no-hits">Sin coincidencias en celdas ocupadas.</p>';
    clearHighlights();
    return;
  }
  cont.innerHTML=hits.map(h=>`
    <div class="search-hit" onclick="scrollToCelda('${h.id}')">
      <span><b>${h.label}</b><br>${h.l.bodega||'-'} · ${h.l.decorado||'-'} · ${h.l.cantPallets||0}p · ${h.l.totalBotellas||0} bot.${h.l.op?(' · OP '+h.l.op):''}</span>
      <span class="arrow">→</span>
    </div>
  `).join('');
  clearHighlights();
  hits.forEach(h=>{
    const el=document.querySelector(`[data-id="${h.id}"]`);
    if(el)el.classList.add('resaltada');
  });
}
function clearHighlights(){document.querySelectorAll('.resaltada').forEach(e=>e.classList.remove('resaltada'))}
function scrollToCelda(id){
  showTab('plano');
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
}

/* ================= ESTADÍSTICAS ================= */
function renderStats(){
  let total=0,ocup=0,pals=0,bot=0;
  [BLOQUE_DECORAR_1,BLOQUE_DECORAR_2,BLOQUE_TERM_1,BLOQUE_TERM_2].forEach(b=>{
    b.celdas.forEach(cod=>{
      total++;
      const lotes=getLotes(cod);
      if(lotes.length){
        ocup++;
        lotes.forEach(l=>{pals+=Number(l.cantPallets||0);bot+=Number(l.totalBotellas||0)});
      }
    });
  });
  const libres=total-ocup;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="v">${total}</div><div class="l">Espacios</div></div>
    <div class="stat"><div class="v" style="color:${libres<=2?'var(--danger)':'var(--ok)'}">${libres}</div><div class="l">Libres</div></div>
    <div class="stat"><div class="v" style="color:var(--danger)">${ocup}</div><div class="l">Ocupados</div></div>
    <div class="stat"><div class="v">${pals}</div><div class="l">Pallets</div></div>
    <div class="stat"><div class="v">${bot}</div><div class="l">Botellas</div></div>
  `;
}

/* ================= RENDER DEL PLANO ================= */
function makeCelda(cod,tipo){
  const lotes=getLotes(cod);
  const div=document.createElement('div');
  div.className='celda '+(lotes.length?'ocupada':'libre');
  div.setAttribute('data-id',cod);
  div.onclick=()=>openModal(cod,tipo);
  const etiq=document.createElement('div');
  etiq.className='etiq';
  etiq.textContent=cod;
  const inner=document.createElement('div');
  inner.className='celda-inner';
  if(lotes.length){
    const totalP=lotes.reduce((a,l)=>a+Number(l.cantPallets||0),0);
    const totalB=lotes.reduce((a,l)=>a+Number(l.totalBotellas||0),0);
    const primero=lotes[0];
    inner.innerHTML=`<span class="dat">${primero.decorado||primero.bodega||'Sin nombre'}${lotes.length>1?' +'+(lotes.length-1):''}</span><span class="sub">${totalB} bot.</span><span class="pals">${totalP}p</span>`;
  } else {
    inner.innerHTML=`<span class="dat">Libre</span>`;
  }
  div.appendChild(etiq);
  div.appendChild(inner);
  return div;
}

function makeBloque(b){
  const bloq=document.createElement('div');
  bloq.className='bloque';
  const lbl=document.createElement('div');
  lbl.className='bloque-label';lbl.textContent=b.label;
  bloq.appendChild(lbl);
  b.celdas.forEach(cod=>bloq.appendChild(makeCelda(cod,b.tipo)));
  return bloq;
}

function makeFijo(f){
  const box=document.createElement('div');
  if(f.conDatos){
    const lotes=getLotes(f.id);
    box.className='fijo-box dinamico '+(lotes.length?'ocupada':'libre');
    box.setAttribute('data-id',f.id);
    box.onclick=()=>openModalFijo(f.id,f.label);
  }else{
    box.className='fijo-box estatico';
  }
  const lbl=document.createElement('div');
  lbl.className='fijo-label';
  lbl.textContent=f.label;
  box.appendChild(lbl);
  if(f.conDatos){
    const lotes=getLotes(f.id);
    const dat=document.createElement('div');
    dat.className='fijo-data';
    if(lotes.length){
      const totalP=lotes.reduce((a,l)=>a+Number(l.cantPallets||0),0);
      const totalB=lotes.reduce((a,l)=>a+Number(l.totalBotellas||0),0);
      dat.innerHTML=`${lotes.length} lote${lotes.length>1?'s':''} · ${totalP}p · ${totalB} bot.`;
    } else {
      dat.innerHTML='<span class="free">Libre</span>';
    }
    box.appendChild(dat);
  }
  return box;
}

function renderDep(){
  const dep=document.getElementById('dep');
  dep.innerHTML='';

  const colIzq=document.createElement('div');
  colIzq.className='zonas';
  colIzq.appendChild(makeBloque(BLOQUE_DECORAR_1));
  colIzq.appendChild(makeBloque(BLOQUE_DECORAR_2));

  FIJOS_IZQ.forEach(f=>fijosIzqWrap.appendChild(makeFijo(f)));
  colIzq.appendChild(fijosIzqWrap);
  dep.appendChild(colIzq);

  const colDer=document.createElement('div');
  colDer.className='zonas';
  colDer.appendChild(makeBloque(BLOQUE_TERM_1));
  colDer.appendChild(makeBloque(BLOQUE_TERM_2));
  const fijosDerWrap=document.createElement('div');
  fijosDerWrap.className='fijo-stack';
  FIJOS_DER.forEach(f=>fijosDerWrap.appendChild(makeFijo(f)));
  colDer.appendChild(fijosDerWrap);

  renderSearch();
}

/* ================= MODAL: lista de lotes ================= */
function openModal(cod,tipo){renderListaModal(cod,tipo,false,cod)}
function openModalFijo(id,label){renderListaModal(id,null,true,label)}

function esc(s){return String(s).replace(/'/g,"\\'")}

    const totalB=lotes.reduce((a,l)=>a+Number(l.totalBotellas||0),0);
    html+=`<div class="lot-summary">
      <div><div class="v">${lotes.length}</div><div class="l">Lotes</div></div>

/* ================= utilidades de fecha/hora ================= */
function pad2(n){return String(n).padStart(2,'0')}
function isoDateNow(){const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`}
function isoTimeNow(){const d=new Date();return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`}
function fechaDisplay(isoDate){
  if(!isoDate)return '';
  const [y,m,dd]=isoDate.split('-');
  return `${dd}/${m}/${y}`;
}
function dateDisplayToISO(disp){
  if(!disp)return '';
  const parts=disp.split('/');
  if(parts.length!==3)return '';
  const [dd,m,y]=parts;
  return `${y}-${pad2(m)}-${pad2(dd)}`;
}

/* ================= MODAL: ingreso ================= */
function openIngresoForm(cod,tipo,isFijo,label){
  document.getElementById('m-title').textContent='Ingreso · '+label;
  document.getElementById('m-body').innerHTML=`
    <div class="fr"><label>Bodega</label><input id="mb" placeholder="Ej: Bodega Norte"></div>
    <div class="fr"><label>Cantidad de pallets</label><input id="mp" type="number" min="1" inputmode="numeric" placeholder="0" oninput="actualizarTotalBotellas()"></div>
    <div class="fr"><label>Botellas por pallet</label><input id="mb2" type="number" min="0" inputmode="numeric" placeholder="0" oninput="actualizarTotalBotellas()"></div>
    <div class="fr"><label>Total de botellas</label><input id="mtotal" type="text" value="0" disabled></div>
    <div class="fr"><label>Nombre de la botella</label><input id="md" placeholder="Ej: Rojo Premium 750ml"></div>
    <div class="fr"><label>N° de OP</label><input id="mop" placeholder="OP-0001"></div>
    <div class="fr"><label>Fecha de ingreso</label><input id="mfecha" type="date" value="${isoDateNow()}"></div>
    <div class="fr"><label>Hora de ingreso</label><input id="mhora" type="time" value="${isoTimeNow()}"></div>
    <div class="fr"><label>Cargado por</label><input id="muser" placeholder="Nombre de quien carga"></div>
    <div class="fr"><label>Observaciones</label><textarea id="mob"></textarea></div>
    <div class="btn-row stack">
      <button class="btn btn-ok" onclick="doIngreso('${cod}','${tipo}',${isFijo},'${esc(label)}')">Ingresar pallet</button>
      <button class="btn btn-ca" onclick="renderListaModal('${cod}','${tipo}',${isFijo},'${esc(label)}')">Volver</button>
    </div>
  `;
  setTimeout(()=>document.getElementById('mb').focus(),50);
}
function actualizarTotalBotellas(){
  const p=Number(document.getElementById('mp').value||0);
  const b=Number(document.getElementById('mb2').value||0);
  document.getElementById('mtotal').value=p*b;
}
function now(){
  const fechaIso=isoDateNow(),horaIso=isoTimeNow();
  return {fecha:fechaDisplay(fechaIso),hora:horaIso,fechaISO:fechaIso,horaISO:horaIso};
}
function doIngreso(cod,tipo,isFijo,label){
  const cantPallets=Number(document.getElementById('mp').value||0);
  const botPallet=Number(document.getElementById('mb2').value||0);
  if(cantPallets<=0){alert('Ingresá una cantidad de pallets válida.');return;}
  const fechaIso=document.getElementById('mfecha').value||isoDateNow();
  const horaIso=document.getElementById('mhora').value||isoTimeNow();
  const entry={
    loteId:'L'+(loteSeq++),
    bodega:document.getElementById('mb').value.trim(),
    cantPallets,botPallet,
    totalBotellas:cantPallets*botPallet,
    decorado:document.getElementById('md').value.trim(),
    op:(document.getElementById('mop')||{}).value||'',
    usuario:document.getElementById('muser').value.trim(),
    obs:document.getElementById('mob').value.trim(),
    fecha:fechaDisplay(fechaIso),hora:horaIso,fechaISO:fechaIso,horaISO:horaIso
  };
  if(!pallets[cod])pallets[cod]=[];
  pallets[cod].push(entry);
  log.unshift({tipo:'ingreso',celda:label,...entry});
  renderDep();renderStats();scheduleSave();
  renderListaModal(cod,tipo,isFijo,label);
}

/* ================= MODAL: edición ================= */
function openEditForm(cod,idx,isFijo,label,tipo){
  const lote=getLotes(cod)[idx];
  if(!lote)return;
  const fechaIso=lote.fechaISO||dateDisplayToISO(lote.fecha)||isoDateNow();
  const horaIso=lote.horaISO||lote.hora||isoTimeNow();
  document.getElementById('m-title').textContent='Editar · '+label;
  document.getElementById('m-body').innerHTML=`
    <div class="fr"><label>Bodega</label><input id="mb" value="${esc(lote.bodega||'')}" placeholder="Ej: Bodega Norte"></div>
    <div class="fr"><label>Cantidad de pallets</label><input id="mp" type="number" min="1" inputmode="numeric" value="${lote.cantPallets}" oninput="actualizarTotalBotellas()"></div>
    <div class="fr"><label>Botellas por pallet</label><input id="mb2" type="number" min="0" inputmode="numeric" value="${lote.botPallet}" oninput="actualizarTotalBotellas()"></div>
    <div class="fr"><label>Total de botellas</label><input id="mtotal" type="text" value="${lote.totalBotellas}" disabled></div>
    <div class="fr"><label>Nombre de la botella</label><input id="md" value="${esc(lote.decorado||'')}" placeholder="Ej: Rojo Premium 750ml"></div>
    <div class="fr"><label>N° de OP</label><input id="mop" value="${esc(lote.op||'')}" placeholder="OP-0001"></div>
    <div class="fr"><label>Fecha de ingreso</label><input id="mfecha" type="date" value="${fechaIso}"></div>
    <div class="fr"><label>Hora de ingreso</label><input id="mhora" type="time" value="${horaIso}"></div>
    <div class="fr"><label>Cargado por</label><input id="muser" value="${esc(lote.usuario||'')}" placeholder="Nombre de quien carga"></div>
    <div class="fr"><label>Observaciones</label><textarea id="mob">${lote.obs||''}</textarea></div>
    <div class="btn-row stack">
      <button class="btn btn-ok" onclick="doEditSave('${cod}',${idx},${isFijo},'${esc(label)}','${tipo||''}')">Guardar cambios</button>
      <button class="btn btn-ca" onclick="renderListaModal('${cod}','${tipo||''}',${isFijo},'${esc(label)}')">Volver</button>
    </div>
  `;
  setTimeout(()=>document.getElementById('mb').focus(),50);
}
function doEditSave(cod,idx,isFijo,label,tipo){
  const lotes=getLotes(cod);
  const lote=lotes[idx];
  if(!lote)return;
  const cantPallets=Number(document.getElementById('mp').value||0);
  const botPallet=Number(document.getElementById('mb2').value||0);
  if(cantPallets<=0){alert('Ingresá una cantidad de pallets válida.');return;}
  const fechaIso=document.getElementById('mfecha').value||isoDateNow();
  const horaIso=document.getElementById('mhora').value||isoTimeNow();
  Object.assign(lote,{
    bodega:document.getElementById('mb').value.trim(),
    cantPallets,botPallet,
    totalBotellas:cantPallets*botPallet,
    decorado:document.getElementById('md').value.trim(),
    op:document.getElementById('mop').value.trim(),
    usuario:document.getElementById('muser').value.trim(),
    obs:document.getElementById('mob').value.trim(),
    fecha:fechaDisplay(fechaIso),hora:horaIso,fechaISO:fechaIso,horaISO:horaIso
  });
  renderDep();renderStats();scheduleSave();
  renderListaModal(cod,tipo,isFijo,label);
}

/* ================= MODAL: egreso ================= */
function openEgresoForm(cod,idx,isFijo,label,tipo){
  const lote=getLotes(cod)[idx];
  if(!lote)return;
  document.getElementById('m-title').textContent='Egreso · '+label;
  document.getElementById('m-body').innerHTML=`
    <div class="lot-item">
      <div class="lr"><span class="lk">Botella</span><span>${lote.decorado||'-'}</span></div>
      <div class="lr"><span class="lk">Bodega</span><span>${lote.bodega||'-'}</span></div>
      <div class="lr"><span class="lk">Pallets disponibles</span><span class="total">${lote.cantPallets}</span></div>
      <div class="lr"><span class="lk">Botellas por pallet</span><span>${lote.botPallet}</span></div>
    </div>
    <div class="fr"><label>Cantidad de pallets a retirar</label><input id="meg" type="number" min="1" max="${lote.cantPallets}" inputmode="numeric" value="${lote.cantPallets}"></div>
    <div class="fr"><label>Retirado por</label><input id="meguser" placeholder="Nombre de quien retira"></div>
    <div class="btn-row stack">
      <button class="btn btn-eg" onclick="doEgreso('${cod}',${idx},${isFijo},'${esc(label)}','${tipo}')">Confirmar egreso</button>
      <button class="btn btn-ca" onclick="renderListaModal('${cod}','${tipo}',${isFijo},'${esc(label)}')">Volver</button>
    </div>
  `;
}
function doEgreso(cod,idx,isFijo,label,tipo){
  const lotes=getLotes(cod);
  const lote=lotes[idx];
  if(!lote)return;
  const qty=Number(document.getElementById('meg').value||0);
  if(qty<=0||qty>lote.cantPallets){alert('Cantidad inválida. Debe ser entre 1 y '+lote.cantPallets+'.');return;}
  const usuarioEgreso=document.getElementById('meguser').value.trim();
  const t=now();
  if(qty>=lote.cantPallets){
    log.unshift({tipo:'egreso',celda:label,...lote,cantPallets:lote.cantPallets,totalBotellas:lote.totalBotellas,usuario:usuarioEgreso||lote.usuario,...t});
    lotes.splice(idx,1);
  }else{
    log.unshift({tipo:'egreso',celda:label,...lote,cantPallets:qty,totalBotellas:qty*lote.botPallet,usuario:usuarioEgreso||lote.usuario,...t});
    lote.cantPallets-=qty;
    lote.totalBotellas=lote.cantPallets*lote.botPallet;
  }
  if(lotes.length===0)delete pallets[cod];
  renderDep();renderStats();scheduleSave();
  renderListaModal(cod,tipo,isFijo,label);
}

function closeModal(){document.getElementById('modal-overlay').style.display='none'}
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target.id==='modal-overlay')closeModal();
});

/* ================= SEGUIMIENTO ================= */
function renderLog(){
  const txt=(document.getElementById('ftxt').value||'').toLowerCase();
  const tipo=document.getElementById('ftipo').value;
  const rows=log.filter(r=>{
    const s=`${r.celda} ${r.bodega||''} ${r.decorado||''} ${r.op||''} ${r.usuario||''}`.toLowerCase();
    return(!txt||s.includes(txt))&&(!tipo||r.tipo===tipo);
  });
  const cont=document.getElementById('log-body');
  if(!rows.length){cont.innerHTML='<p class="empty-log">Sin registros todavía.</p>';return;}
  cont.innerHTML=rows.map(r=>`
    <div class="log-card">
      <div class="top-row">
        <span class="badge ${r.tipo==='ingreso'?'b-in':'b-out'}">${r.tipo}</span>
        <span class="when">${r.fecha} · ${r.hora}</span>
      </div>
      <div class="celda-name">${r.celda}</div>
      <div class="log-grid">
        <div class="row"><span class="k">Bodega</span><span>${r.bodega||'-'}</span></div>
        <div class="row"><span class="k">Botella</span><span>${r.decorado||'-'}</span></div>
        <div class="row"><span class="k">Pallets</span><span>${r.cantPallets||'-'}</span></div>
        <div class="row"><span class="k">Bot. totales</span><span>${r.totalBotellas||'-'}</span></div>
        <div class="row"><span class="k">OP</span><span>${r.op||'-'}</span></div>
        <div class="row"><span class="k">Cargado por</span><span>${r.usuario||'-'}</span></div>
      </div>
    </div>
  `).join('');
}

function exportCSV(){
  if(!log.length){alert('No hay movimientos para exportar.');return;}
  const headers=['Fecha','Hora','Tipo','Celda','Bodega','Nombre botella','Cantidad de pallets','Botellas por pallet','Total botellas','OP','Cargado por','Observaciones'];
  const rows=log.map(r=>[r.fecha,r.hora,r.tipo,r.celda,r.bodega||'',r.decorado||'',r.cantPallets||'',r.botPallet||'',r.totalBotellas||'',r.op||'',r.usuario||'',(r.obs||'').replace(/[\n\r,]/g,' ')]);
  const csv=[headers.join(','),...rows.map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`seguimiento_deposito_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ================= TABS ================= */
function showTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tabbtn-'+t).classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='log')renderLog();
}

/* ================= PWA: instalación + service worker ================= */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
function doInstall(){
  document.getElementById('install-banner').classList.remove('show');
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}
}
window.addEventListener('appinstalled',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

loadState();
